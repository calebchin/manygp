experiment:
  name: cifar10_classifier
  smoke_test: false

data:
  root: ../datafolder/data
  batch_size: 256
  num_workers: 2

model:
  num_classes: 10
  widen_factor: 10       # Wide ResNet-28-10 (matches other april_4 experiments)
  embedding_dim: 128     # Encoder output dimension before classifier head

training:
  epochs: 200
  eval_interval: 5
  log_every_steps: 20
  lr: 0.001
  weight_decay: 0.0

ood:
  enabled: true
  cifarc_root: ../datafolder/data
  corruptions: null
  severities: [1, 2, 3, 4, 5]

output:
  checkpoint_path: ./checkpoints_april4/deterministic/cifar10_deterministic.pt
  top_k: 1
  checkpoint_metric: val_accuracy   # higher is better

wandb:
  enabled: true
  project: april_4_experiments
  entity: sta414manygp
  run_name: deterministic
