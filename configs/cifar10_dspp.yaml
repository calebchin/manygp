experiment:
  name: cifar10_dspp
  smoke_test: false

data:
  root: ./data
  batch_size: 128
  num_workers: 0

cnn:
  latent_dim: 64
  num_classes: 10
  pretrain_epochs: 20
  pretrain_lr: 0.01
  pretrain_milestones: [10, 15]

dspp:
  num_inducing_pts: 128
  hidden_dim: 10
  num_quad_sites: 8
  inducing_pool_size: 5000

training:
  num_epochs: 50
  initial_lr: 0.01
  milestones: [20, 40]
  beta_reg: 0.05

wandb:
  enabled: true
  project: manygp
  entity: sta414manygp
  run_name: null   
   # null = auto-generated by W&B, recommended to change with details on the run
