experiment:
  name: cifar100_supcon_sngp
  smoke_test: false

data:
  root: ../datafolder/data
  batch_size: 256
  num_workers: 4

model:
  num_classes: 100
  widen_factor: 10       # Wide ResNet-28-10 (as in Liu et al. 2020)
  embedding_dim: 128     # Encoder output / GP input dimension
  hidden_dims: []        # No extra MLP layers between encoder and GP head
  dropout_rate: 0.1
  kernel_type: normalized_rbf
  input_normalization: l2
  kernel_scale: 1.0
  length_scale: 1.0
  num_inducing: 1024
  ridge_penalty: 0.001   # Covariance ridge factor s (paper Table 5: 0.001)
  feature_scale: 2.0     # Length-scale parameter l (paper Table 5: 2.0)
  gp_cov_momentum: 0.999 # Covariance discount factor m (paper Table 5: 0.999, EMA)
  normalize_input: false # input_normalization: l2 below already handles this
  optimize_length_scale: false  # set true to optimize length scale via MML

training:
  epochs: 200
  eval_interval: 5
  log_every_steps: 20
  lr: 0.001
  weight_decay: 0.0
  supcon_temperature: 0.07
  supcon_loss_weight: 1.0
  ce_loss_weight: 1.0
  num_mc_samples: 10

mml:
  enabled: false           # set to true to optimize length scale via MML
  lr: 0.001
  interval_epochs: 1       # run MML step every N epochs
  steps_per_interval: 5    # number of MML gradient steps per interval

ood:
  enabled: false

output:
  checkpoint_path: ./checkpoints_april6/cifar100_supcon_sngp/cifar100_supcon_sngp.pt
  top_k: 5
  checkpoint_metric: val_accuracy

wandb:
  enabled: true
  project: april_6_cifar100_experiments
  entity: sta414manygp
  run_name: cifar100_supcon_sngp
