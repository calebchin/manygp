experiment:
  name: cifar100_frozen_sngp
  smoke_test: false

data:
  root: ../datafolder/data
  batch_size: 256
  num_workers: 4

backbone:
  checkpoint_path: ./checkpoints_supcon/cifar100_supcon_best.pt
  width: 64
  embedding_dim: 128

model:
  num_classes: 100
  hidden_dims: []
  spec_norm_bound: 0.95
  dropout_rate: 0.1
  kernel_type: normalized_rbf
  input_normalization: l2
  kernel_scale: 1.0
  length_scale: 1.0
  num_inducing: 1024
  ridge_penalty: 1.0
  feature_scale: 2.0
  gp_cov_momentum: -1.0
  normalize_input: false

training:
  epochs: 100
  eval_interval: 1
  log_every_steps: 20
  lr: 0.0001
  weight_decay: 0.0
  num_mc_samples: 10

output:
  checkpoint_path: ./checkpoints_frozen_sngp/cifar100_frozen_sngp.pt
  top_k: 10

wandb:
  enabled: true
  project: sngp
  entity: sta414manygp
  run_name: cifar100_sngp_frozen
