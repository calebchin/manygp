experiment:
  name: cifar10_dinov2_mlp
  smoke_test: false

data:
  root: ../datafolder/data
  batch_size: 128
  num_workers: 4

backbone:
  model_name: dinov2_vits14
  pretrained: true

model:
  num_classes: 10
  hidden_dims: [256]
  dropout_rate: 0.1

training:
  epochs: 50
  eval_interval: 5
  log_every_steps: 20
  lr: 0.001
  weight_decay: 0.0
  seed: 42

ood:
  enabled: true

output:
  checkpoint_path: ./checkpoints_april20/cifar10_dinov2_mlp/cifar10_dinov2_mlp.pt
  top_k: 5
  checkpoint_metric: val_accuracy

wandb:
  enabled: true
  project: april_20_cifar10_dinov2_mlp
  entity: sta414manygp
  run_name: cifar10_dinov2_mlp_vits14
