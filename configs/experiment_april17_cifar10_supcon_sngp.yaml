experiment:
  name: cifar10_supcon_sngp_mml
  smoke_test: false

data:
  root: ../datafolder/data
  batch_size: 256
  num_workers: 2

model:
  widen_factor: 10
  embedding_dim: 128
  num_classes: 10
  hidden_dims: []
  dropout_rate: 0.1
  kernel_type: normalized_rbf
  input_normalization: l2
  kernel_scale: 1.0
  length_scale: 1.0
  num_inducing: 1024
  ridge_penalty: 1.0
  feature_scale: 2.0
  gp_cov_momentum: -1.0
  normalize_input: false
  optimize_length_scale: true  # set false to disable MML

training:
  epochs: 100
  eval_interval: 1
  log_every_steps: 20
  lr: 0.001
  weight_decay: 0.0001
  supcon_temperature: 0.07
  supcon_loss_weight: 1.0
  ce_loss_weight: 1.0
  num_mc_samples: 10

mml:
  enabled: true             # set false to disable MML
  lr: 0.001
  interval_epochs: 1        # run MML step every N epochs
  steps_per_interval: 5     # number of MML gradient steps per interval

ood:
  enabled: true

output:
  checkpoint_path: ./checkpoints_april17/cifar10_supcon_sngp_mml/cifar10_supcon_sngp_mml.pt
  top_k: 5
  checkpoint_metric: val_accuracy

wandb:
  enabled: true
  project: april_17_cifar10_mml_experiments
  entity: sta414manygp
  run_name: cifar10_supcon_sngp_mml
