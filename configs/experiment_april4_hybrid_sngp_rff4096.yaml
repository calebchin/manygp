experiment:
  name: cifar10_hybrid_sngp_rff4096
  smoke_test: false

data:
  root: ../datafolder/data
  batch_size: 256
  num_workers: 2

model:
  # SN WRN-28-10 backbone — identical to Hybrid SNGP but with 4096 RFF features
  num_classes: 10
  widen_factor: 10
  hidden_dim: 128
  spec_norm_bound: 6.0
  kernel_type: normalized_rbf
  input_normalization: l2  # cosine geometry — matches SupCon and MS Loss
  kernel_scale: 1.0
  length_scale: 1.0
  num_inducing: 4096        # 4× more random Fourier features than baseline (1024)
  ridge_penalty: 0.001
  feature_scale: 2.0
  gp_cov_momentum: 0.999
  normalize_input: false    # l2 input_normalization above already handles this

training:
  epochs: 200
  eval_interval: 5
  log_every_steps: 20
  lr: 0.001
  weight_decay: 0.0
  num_mc_samples: 10

  # SupCon hyperparameters
  supcon_temperature: 0.07
  supcon_loss_weight: 0.5   # 0.5+0.5=1.0 total metric signal, same as each individual experiment

  # MS Loss hyperparameters
  ms_alpha: 2.0
  ms_beta: 50.0
  ms_base: 0.5
  ms_eps: 0.1
  ms_loss_weight: 0.5       # halved for same reason

  # CE weight
  ce_loss_weight: 1.0

ood:
  enabled: true
  cifarc_root: ../datafolder/data
  corruptions: null
  severities: [1, 2, 3, 4, 5]

output:
  checkpoint_path: ./checkpoints_april4/hybrid_sngp_rff4096/cifar10_hybrid_sngp_rff4096.pt
  top_k: 5
  checkpoint_metric: val_accuracy

wandb:
  enabled: true
  project: april_4_experiments
  entity: sta414manygp
  run_name: hybrid_sngp_rff4096
