experiment:
  name: cifar10_frozen_backbone_sngp
  smoke_test: false

data:
  root: ../datafolder/data
  batch_size: 256
  num_workers: 2

backbone:
  checkpoint_path: ./checkpoints_simclr/cifar10_simclr_backbone.pt
  widen_factor: 10
  embedding_dim: 128

model:
  num_classes: 10
  hidden_dims: []
  spec_norm_bound: 0.95
  dropout_rate: 0.1
  kernel_type: normalized_rbf
  input_normalization: l2
  kernel_scale: 1.0
  length_scale: 1.0
  num_inducing: 1024
  ridge_penalty: 1.0
  feature_scale: 2.0
  gp_cov_momentum: -1.0
  normalize_input: false

training:
  epochs: 100
  eval_interval: 5
  log_every_steps: 20
  lr: 0.001
  weight_decay: 0.0
  num_mc_samples: 10

ood:
  enabled: true

output:
  checkpoint_path: ./checkpoints_april18/cifar10_frozen_backbone_sngp/cifar10_frozen_backbone_sngp.pt
  top_k: 5
  checkpoint_metric: val_accuracy

wandb:
  enabled: true
  project: april_18_cifar10_frozen_backbone_sngp
  entity: sta414manygp
  run_name: cifar10_frozen_backbone_sngp
