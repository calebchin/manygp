experiment:
  name: cifar10_deep_ensemble
  smoke_test: false

data:
  root: ../datafolder/data
  batch_size: 256
  num_workers: 4

model:
  embedding_dim: 128
  num_classes: 10
  width: 64

ensemble:
  num_members: 5
  seeds: [0, 1, 2, 3, 4]

training:
  epochs: 100
  eval_interval: 5
  log_every_steps: 20
  lr: 0.001
  weight_decay: 0.0001

output:
  checkpoint_dir: ./checkpoints_ensemble_cifar10/

wandb:
  enabled: true
  project: Updated_run
  entity: sta414manygp
  run_name: deep_ensemble_cifar10
