experiment:
  name: cifar10_ms_sngp
  smoke_test: false

data:
  root: ../datafolder/data
  batch_size: 256
  num_workers: 2

model:
  num_classes: 10
  widen_factor: 10       # Wide ResNet-28-10 — matches all other april_4 experiments
  embedding_dim: 128     # GP input dimension (same as SupCon+SNGP)
  hidden_dims: []
  dropout_rate: 0.1
  kernel_type: normalized_rbf
  input_normalization: l2
  kernel_scale: 1.0
  length_scale: 1.0
  num_inducing: 1024
  ridge_penalty: 0.001
  feature_scale: 2.0
  gp_cov_momentum: 0.999
  normalize_input: false   # input_normalization: l2 already handles this

training:
  epochs: 100
  eval_interval: 5
  log_every_steps: 20
  lr: 0.001
  weight_decay: 0.0
  num_mc_samples: 10

  # MS Loss hyperparameters (Wang et al., CVPR 2019)
  # alpha: controls how steeply hard positive pairs are up-weighted
  # beta:  controls how steeply hard negative pairs are up-weighted
  # base:  similarity threshold λ — separates positive from negative regime
  # eps:   mining margin — how far past the boundary a pair must be to be included
  ms_alpha: 2.0
  ms_beta:  50.0
  ms_base:  0.5
  ms_eps:   0.1

  # Joint loss weights
  ms_loss_weight: 1.0
  ce_loss_weight: 1.0

ood:
  enabled: true
  cifarc_root: ../datafolder/data
  corruptions: null
  severities: [1, 2, 3, 4, 5]

output:
  checkpoint_path: ./checkpoints_april4/ms_sngp/cifar10_ms_sngp.pt
  top_k: 5
  checkpoint_metric: val_accuracy

wandb:
  enabled: true
  project: april_4_experiments
  entity: sta414manygp
  run_name: ms_sngp
